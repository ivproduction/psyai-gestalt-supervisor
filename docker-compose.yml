services:

  app:
    build: .
    expose:
      - "8000"
    networks:
      - caddy-public
      - default
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook/gestalt-supervisor}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-2-preview}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      RAG_RESPONSE_MODEL: ${RAG_RESPONSE_MODEL:-gemini-3-flash-preview}
      PDF_PROCESSING_MODEL: ${PDF_PROCESSING_MODEL:-gemini-1.5-flash}
      TOP_K: ${TOP_K:-5}
      CACHE_TTL_DAYS: ${CACHE_TTL_DAYS:-30}
      HISTORY_TTL_DAYS: ${HISTORY_TTL_DAYS:-14}
      HISTORY_MAX_MESSAGES: ${HISTORY_MAX_MESSAGES:-28}
      LOG_TO_FILE: ${LOG_TO_FILE:-false}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psychoai}
      POSTGRES_USER: ${POSTGRES_USER:-psychoai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psychoai} -d ${POSTGRES_DB:-psychoai}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  app_data:
  redis_data:
  qdrant_data:
  postgres_data:

networks:
  caddy-public:
    external: true
  default:
